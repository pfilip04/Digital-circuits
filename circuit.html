<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="circuit.css" />
    <title>Circuits</title>
</head>

<body>
    <h1>Electronic-logic circuits</h1>
    
    <div id="content">

        <svg viewBox="0 0 800 400">

            <circle id="tcircle" class="wire" cx="400" cy="170" r="75" fill="none" stroke-width="2"/>

            <line id="wireB0" class="wire active" x1="300" y1="160" x2="350" y2="160"/>

            <line id="wireOut0_2" class="wire" x1="450" y1="160" x2="500" y2="160"/>

            <line id="wireB0_2" class="wire active" x1="350" y1="160" x2="370" y2="210"/>

            <line id="wireOut0" class="wire" x1="450" y1="160" x2="430" y2="210"/>

            <line id="wireA0_2" class="wire" x1="360" y1="210" x2="440" y2="210"/>

            <line id="wireA0" class="wire" x1="400" y1="210" x2="400" y2="270"/>

            <rect id="switchA0" class="switch" x="375" y="270" width="50" height="35" rx="8"/>
            
            <circle id="lamp0" class="lamp" cx="520" cy="160" r="20"/>

        </svg>

        <svg viewBox="0 0 800 400">

            <text x="405" y="120" text-anchor="middle">NOT</text>

            <rect id="switchA1" class="switch" x="105" y="160" width="60" height="40" rx="8"/>
            <text x="135" y="145" text-anchor="middle">A</text>

            <line id="wireA1" class="wire" x1="165" y1="180" x2="405" y2="180" />

            <line id="wireOut1" class="wire active" x1="405" y1="180" x2="655" y2="180" />
        
            <circle id="lamp1" class="lamp" cx="675" cy="180" r="20"/>
            <text x="675" y="140" text-anchor="middle">OUT</text>

        </svg>

        <svg viewBox="0 0 800 400">

            <text x="405" y="120" text-anchor="middle">AND</text>

            <rect id="switchA2" class="switch" x="105" y="100" width="60" height="40" rx="8"/>
            <text x="135" y="90" text-anchor="middle">A</text>
        
            <rect id="switchB2" class="switch" x="105" y="240" width="60" height="40" rx="8"/>
            <text x="135" y="230" text-anchor="middle">B</text>

            <line id="wireA2" class="wire" x1="165" y1="120" x2="405" y2="180" />
            <line id="wireB2" class="wire" x1="165" y1="260" x2="405" y2="180" />
        
            <line id="wireOut2" class="wire" x1="405" y1="180" x2="655" y2="180" />

            <circle id="lamp2" class="lamp" cx="675" cy="180" r="20"/>
            <text x="675" y="140" text-anchor="middle">OUT</text>

        </svg>

        <svg viewBox="0 0 800 400">

            <text x="405" y="120" text-anchor="middle">OR</text>

            <rect id="switchA3" class="switch" x="105" y="100" width="60" height="40" rx="8"/>
            <text x="135" y="90" text-anchor="middle">A</text>
        
            <rect id="switchB3" class="switch" x="105" y="240" width="60" height="40" rx="8"/>
            <text x="135" y="230" text-anchor="middle">B</text>

            <line id="wireA3" class="wire" x1="165" y1="120" x2="405" y2="180" />
            <line id="wireB3" class="wire" x1="165" y1="260" x2="405" y2="180" />
        
            <line id="wireOut3" class="wire" x1="405" y1="180" x2="655" y2="180" />

            <circle id="lamp3" class="lamp" cx="675" cy="180" r="20"/>
            <text x="675" y="140" text-anchor="middle">OUT</text>

        </svg>

    </div>

    <script src="circuit.js"></script>
</body>

</html>
